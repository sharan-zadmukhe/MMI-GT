<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login with Google</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="login-container">
        <h2>Welcome Back</h2>
        <p>Sign in quickly using your Google account.</p>

        <div id="g_id_onload"
             data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
             data-context="signin"
             data-ux_mode="popup"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>

        <div class="g_id_signin"
             data-type="standard"
             data-shape="rectangular"
             data-theme="outline"
             data-text="signin_with"
             data-size="large"
             data-logo_alignment="left">
        </div>

        <p class="footer-text">By signing in, you agree to our Terms of Service.</p>
    </div>

    <script>
        function handleCredentialResponse(response) {
            // This is where you handle the user's login data (JWT token)
            console.log("Encoded JWT ID token: " + response.credential);
            // Typically, you would send this token to your server for verification
        }
    </script>
</body>
</html>
